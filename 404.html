<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | St. Mary's Kibabii Boys National School (Kiba)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f2b, #071a1f);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #c9a03d;
            font-family: 'Playfair Display', serif;
            line-height: 1;
        }
        .error-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .error-message {
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .btn-home {
            display: inline-block;
            background: #c9a03d;
            color: #0a2f2b;
            padding: 12px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .kiba-badge {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found at Kiba</h1>
        <p class="error-message">The page you are looking for does not exist or has been moved at St. Mary's Kibabii (Kiba) website.</p>
        <a href="index.html" class="btn-home"><i class="fas fa-home"></i> Return to Kiba Home</a>
        <div class="kiba-badge">St. Mary's Kibabii Boys National School - Kiba</div>
    </div>
</body>
</html>
